<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>autopi SSM</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="top">
    <div class="brand">autopi</div>
    <div class="status">
      <span id="conn" class="pill offline">connecting</span>
      <span id="ecu" class="meta">ECU —</span>
      <span id="rate" class="meta">— Hz</span>
    </div>
  </header>

  <p id="error" class="error" hidden></p>

  <section class="gauges" id="gauges"></section>
  <section class="charts" id="charts"></section>

  <section class="ap-share" id="apShare" hidden>
    <h2>Guest WiFi</h2>
    <p class="ap-blurb">Scan to join <span id="guestSsid">AUTOPI</span>, then open the dashboard. Guest access is limited to this UI.</p>
    <div class="ap-grid">
      <figure>
        <img id="wifiQr" alt="WiFi join QR code" width="180" height="180" />
        <figcaption>Join WiFi</figcaption>
      </figure>
      <figure>
        <img id="urlQr" alt="Dashboard URL QR code" width="160" height="160" />
        <figcaption>Open dashboard</figcaption>
      </figure>
      <div class="ap-meta">
        <div><span class="lbl">SSID</span> <code id="guestSsidCode">—</code></div>
        <div><span class="lbl">URL</span> <code id="guestUrl">—</code></div>
        <div><span class="lbl">Admin</span> <code>USB gadget</code> <span class="hint">(no second WiFi AP on this radio)</span></div>
      </div>
    </div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
