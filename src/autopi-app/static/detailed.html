<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>autopi · Detailed</title>
  <meta http-equiv="Cache-Control" content="no-store" />
  <link rel="stylesheet" href="/static/style.css?v=5" />
  <link rel="icon" href="/static/brand-mark.svg" type="image/svg+xml" />
</head>
<body data-view="detailed">
  <header class="top">
    <div class="brand-block">
      <a class="brand" href="/" aria-label="autopi home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-word">
          <span class="brand-auto">auto</span><span class="brand-pi">pi</span>
        </span>
      </a>
      <nav class="view-nav" aria-label="Views">
        <a href="/dashboard" class="view-link">Dash</a>
        <a href="/detailed" class="view-link active" aria-current="page">Detailed</a>
      </nav>
    </div>
    <div class="status">
      <span id="conn" class="pill offline">connecting</span>
      <span id="ecu" class="meta">ECU —</span>
      <span id="rate" class="meta">— Hz</span>
    </div>
  </header>

  <p id="error" class="error" hidden></p>

  <section class="gauges" id="gauges"></section>
  <section class="charts" id="charts"></section>

  <script src="/static/app.js?v=17"></script>
</body>
</html>
